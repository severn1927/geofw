backend:
  name: github
  repo: severn1927/geofw
  branch: master
  base_url: http://geofw.css123.com

media_folder: public/images/blog
public_folder: /images/blog

locale: zh

collections:
  - name: blog
    label: 博客文章
    folder: src/content/blog
    create: true
    slug: "{{slug}}"
    extension: md
    format: frontmatter
    fields:
      - { label: "标题", name: "title", widget: "string" }
      - { label: "描述", name: "description", widget: "text" }
      - { label: "发布日期", name: "pubDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD" }
      - { label: "更新日期", name: "updatedDate", widget: "datetime", format: "YYYY-MM-DD", date_format: "YYYY-MM-DD", required: false }
      - { label: "作者", name: "author", widget: "string", default: "友擎GEO团队" }
      - { label: "标签", name: "tags", widget: "list", allow_add: true }
      - { label: "封面图", name: "image", widget: "image", required: false }
      - { label: "草稿", name: "draft", widget: "boolean", default: false }
      - { label: "正文", name: "body", widget: "markdown" }
